<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOSSA AI OS Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header>
    <h1>BOSSA AI OS — Dashboard</h1>
    <p>Signals, weekly brief, decisions, and actions in one internal control panel.</p>

    <div class="meta">
      <span id="weekOf"></span> • Last updated: <span id="lastUpdated"></span>
    </div>
  </header>

  <div class="container">

    <!-- KPI -->
    <section class="topbar">
      <div class="kpi">
        <h3>Top Threat</h3>
        <p id="topThreat"></p>
      </div>

      <div class="kpi">
        <h3>Promo Pressure</h3>
        <p id="promoPressure"></p>
      </div>

      <div class="kpi">
        <h3>Pricing Actions</h3>
        <p id="pricingActions"></p>
      </div>

      <div class="kpi">
        <h3>Open Decisions</h3>
        <p id="openDecisions"></p>
      </div>
    </section>

    <!-- Boss Summary -->
    <div class="card">
      <h2>🕶️ Boss Summary</h2>
      <div id="bossSummary"></div>
    </div>

    <section class="grid">

      <div>
        <div class="card">
          <h2>🔥 Market Signals</h2>
          <div id="signalsList"></div>
        </div>

        <div class="card">
          <h2>🧠 Weekly Brief</h2>
          <div id="briefBox"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>🧾 Latest Decisions</h2>
          <div id="decisionsList"></div>
        </div>

        <div class="card">
          <h2>📢 Action Panel</h2>
          <div id="actionsList"></div>
        </div>
      </div>

    </section>
  </div>

  <!-- JS -->
  <script src="./app.js"></script>
</body>
</html>
